name: CI

on:
  push:
    branches:
      - main
      - alpha
      - beta
      - 'feature/**'
  pull_request:
    branches:
      - main
      - alpha
      - beta

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:ci

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking; static site has no server runtime
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Only flag high/critical. Moderate advisories here are all build/dev-time
      # tooling (jest, gray-matter, next's postcss) with no static-site runtime
      # exposure, and their only "fix" is major downgrades — so they're noise.
      - run: npm audit --audit-level=high
